version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusftp-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://ifpt.xus.me:3434,http://localhost:3434,http://localhost:3000}
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - LOG_LEVEL=info
      - FTP_TIMEOUT=30000
      - SFTP_TIMEOUT=30000
      - TRASH_RETENTION_DAYS=30
    volumes:
      - nexusftp-data:/app/data
      - nexusftp-logs:/app/logs
    networks:
      - nexusftp-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Web Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexusftp-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
      - VITE_WS_URL=ws://ifpt.xus.me:3434/ws
    ports:
      - "${PORT:-3434}:80"
    networks:
      - nexusftp-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  nexusftp-net:
    driver: bridge
    name: nexusftp-network

volumes:
  nexusftp-data:
    driver: local
  nexusftp-logs:
    driver: local
